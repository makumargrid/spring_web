openapi: 3.0.3
info:
  title: Account REST API
  description: >-
    RESTful service for managing Account resources. Supports CRUD operations and a
    searchable, paginated, sortable listing endpoint with filtering.
  version: 1.0.0
  license:
    name: Apache-2.0
servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: accounts
    description: Account management

paths:
  /api/v1/accounts:
    get:
      tags: [accounts]
      summary: List accounts (paginated, filterable, sortable)
      operationId: listAccounts
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: username
          in: query
          description: Exact match; repeatable to match any of several usernames (IN).
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: status
          in: query
          description: Exact match; repeatable to match any of several statuses (IN).
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/AccountStatus'
          style: form
          explode: true
        - name: email
          in: query
          description: Partial, case-insensitive match (contains).
          required: false
          schema:
            type: string
        - name: balanceGt
          in: query
          description: Returns accounts whose balance is strictly greater than this value.
          required: false
          schema:
            type: number
            format: double
        - name: balanceLt
          in: query
          description: Returns accounts whose balance is strictly less than this value.
          required: false
          schema:
            type: number
            format: double
        - name: createdAfter
          in: query
          description: Returns accounts created strictly after this instant (ISO-8601).
          required: false
          schema:
            type: string
            format: date-time
        - name: createdBefore
          in: query
          description: Returns accounts created strictly before this instant (ISO-8601).
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: A page of accounts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAccountResponse'
    post:
      tags: [accounts]
      summary: Create an account
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Account created.
          headers:
            Location:
              description: URI of the newly created account.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          $ref: '#/components/responses/ValidationError'

  /api/v1/accounts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [accounts]
      summary: Get an account by id
      operationId: getAccount
      responses:
        '200':
          description: The account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [accounts]
      summary: Update an account
      operationId: updateAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountRequest'
      responses:
        '200':
          description: Account updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [accounts]
      summary: Delete an account
      operationId: deleteAccount
      responses:
        '204':
          description: Account deleted.
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    PageParam:
      name: page
      in: query
      description: Zero-based page index.
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    SizeParam:
      name: size
      in: query
      description: Page size.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    SortParam:
      name: sort
      in: query
      description: >-
        Sort criteria in the format `property,(asc|desc)`. Repeatable. Sortable
        properties: username, balance, createdAt, status, email.
      required: false
      schema:
        type: array
        items:
          type: string
      style: form
      explode: true

  responses:
    NotFound:
      description: Resource not found (RFC 7807).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    ValidationError:
      description: Validation failed (RFC 7807, with field-level errors).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationProblemDetail'

  schemas:
    AccountStatus:
      type: string
      enum: [ACTIVE, INACTIVE, SUSPENDED]

    AccountResponse:
      type: object
      description: Account view returned to clients. Never includes the password.
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        status:
          $ref: '#/components/schemas/AccountStatus'
        balance:
          type: number
          format: double
          example: 1250.75
        createdAt:
          type: string
          format: date-time
      required: [id, username, email, status, balance, createdAt]

    CreateAccountRequest:
      type: object
      properties:
        username:
          type: string
          description: 3-20 chars, letters/digits/underscore only.
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 64
          example: s3cretPass
        status:
          $ref: '#/components/schemas/AccountStatus'
        balance:
          type: number
          format: double
          minimum: 0
          example: 1250.75
      required: [username, email, password, status, balance]

    UpdateAccountRequest:
      type: object
      properties:
        username:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 64
        status:
          $ref: '#/components/schemas/AccountStatus'
        balance:
          type: number
          format: double
          minimum: 0
      required: [username, email, password, status, balance]

    PageMetadata:
      type: object
      properties:
        page:
          type: integer
          description: Current zero-based page index.
        size:
          type: integer
          description: Requested page size.
        totalElements:
          type: integer
          format: int64
          description: Total number of matching elements.
        totalPages:
          type: integer
          description: Total number of pages.
        first:
          type: boolean
        last:
          type: boolean
      required: [page, size, totalElements, totalPages, first, last]

    PagedAccountResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AccountResponse'
        metadata:
          $ref: '#/components/schemas/PageMetadata'
      required: [content, metadata]

    ProblemDetail:
      type: object
      description: RFC 7807 problem detail.
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri

    ValidationProblemDetail:
      allOf:
        - $ref: '#/components/schemas/ProblemDetail'
        - type: object
          properties:
            errors:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string
                required: [field, message]
